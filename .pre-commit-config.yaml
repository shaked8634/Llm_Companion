repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: pnpm run lint
        language: system
        pass_filenames: false
        always_run: true

      - id: format
        name: format
        entry: pnpm run format
        language: system
        pass_filenames: false
        always_run: true

      - id: compile
        name: compile
        entry: pnpm run compile
        language: system
        pass_filenames: false
        always_run: true

      - id: test
        name: test
        entry: pnpm run test
        language: system
        pass_filenames: false
        always_run: true
