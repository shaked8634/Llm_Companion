name: Build and Release

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-*"

jobs:
  build-release:
    runs-on: ubuntu-24-js
    env:
      ARTIFACT_NAME: llm_companion
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - name: Update version in package.json
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            pnpm pkg set version=0.0.0
          else
            pnpm pkg set version=${{ github.ref_name }}
          fi
      - run: WXT_RELEASE_VERSION=${{ github.ref_name }} pnpm run zip
      - run: WXT_RELEASE_VERSION=${{ github.ref_name }} pnpm run zip:firefox
      - name: Copy artifacts
        run: |
          mkdir -p /upload
          mv .output/*.zip /upload
      - uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: https://forgejo.o-st.dev
          repo: ST_Consultancy/Llm_companion
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          release-dir: /upload
          prerelease: ${{ contains(github.ref_name, '-') }}
          release-notes-file: release-notes/${{ github.ref_name }}.md
          override: true
      - name: Upload to Chrome Web Store
        if: ${{ !contains(github.ref_name, '-') }}
        continue-on-error: true
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          ZIP_PATH="/upload/llm-companion-${{ github.ref_name }}-chromium.zip"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "Chrome zip not found at $ZIP_PATH" >&2
            exit 1
          fi
          pnpm dlx chrome-webstore-upload-cli upload \
            --source "$ZIP_PATH" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
      - name: Publish
        if: ${{ !contains(github.ref_name, '-') }}
        continue-on-error: true
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          pnpm dlx chrome-webstore-upload-cli publish \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
