name: Test CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-24-js
    env:
      EXTENSION_ARTIFACT_NAME: llm_companion
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - name: Renovate
        continue-on-error: true
        uses: https://github.com/renovatebot/github-action@v46.1.4
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          mount-docker-socket: false
        env:
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://forgejo.o-st.dev/api/v1
          RENOVATE_BINARY_SOURCE: install
          GIT_AUTHOR_NAME: Renovate Bot
          GIT_AUTHOR_EMAIL: renovate-bot@o-st.dev
          GIT_COMMITTER_NAME: Renovate Bot
          GIT_COMMITTER_EMAIL: renovate-bot@o-st.dev
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate-bot@o-st.dev>
          RENOVATE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm run zip
      - run: pnpm run zip:firefox

  build-release:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-24-js
    env:
      ARTIFACT_NAME: llm_companion
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm pkg set version=0.0.0
      - run: WXT_RELEASE_VERSION=latest pnpm run zip
      - run: WXT_RELEASE_VERSION=latest pnpm run zip:firefox
      - name: Copy artifacts
        run: |
          mkdir -p /upload
          mv .output/*.zip /upload
      - uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: https://forgejo.o-st.dev
          repo: ST_Consultancy/Llm_companion
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
          release-dir: /upload
          prerelease: true
          release-notes: Development build from CI
          override: true
