name: Test CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-24-js
    env:
      EXTENSION_ARTIFACT_NAME: llm_companion
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - name: Renovate
        continue-on-error: true
        uses: https://github.com/renovatebot/github-action@v46.1.4
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          mount-docker-socket: false
        env:
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://forgejo.o-st.dev/api/v1
          RENOVATE_BINARY_SOURCE: install
          GIT_AUTHOR_NAME: Renovate Bot
          GIT_AUTHOR_EMAIL: renovate-bot@o-st.dev
          GIT_COMMITTER_NAME: Renovate Bot
          GIT_COMMITTER_EMAIL: renovate-bot@o-st.dev
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate-bot@o-st.dev>
          RENOVATE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm run zip
      - run: pnpm run zip:firefox

  build-release:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-24-js
    env:
      ARTIFACT_NAME: llm_companion
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm run zip
      - name: Create/update release via API
        run: |
          set -euo pipefail
          API="https://forgejo.o-st.dev/api/v1"
          REPO="ST_Consultancy/Llm_companion"
          TAG="latest"
          AUTH="Authorization: token ${{ secrets.GITHUB_TOKEN }}"

          # Delete existing release (ignore 404)
          EXISTING=$(curl -sf "$API/repos/$REPO/releases/tags/$TAG" \
            -H "$AUTH") || EXISTING=""
          if [ -n "$EXISTING" ]; then
            RELEASE_ID=$(echo "$EXISTING" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            echo "Deleting existing release id=$RELEASE_ID"
            curl -sf -X DELETE "$API/repos/$REPO/releases/$RELEASE_ID" -H "$AUTH" || true
          fi

          # Delete existing tag (ignore 404)
          curl -sf -X DELETE "$API/repos/$REPO/tags/$TAG" -H "$AUTH" || true

          # Create new release
          BODY=$(python3 -c "import json,sys; print(json.dumps({'tag_name': 'latest', 'prerelease': True, 'body': open('release-notes/latest.md').read()}))")
          RESP=$(curl -sf -X POST "$API/repos/$REPO/releases" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "$BODY")
          RELEASE_ID=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "Created release id=$RELEASE_ID"
          echo "Release $TAG created successfully"
